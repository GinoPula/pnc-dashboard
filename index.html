<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dashboard PNC" />
    <meta name="theme-color" content="#1F3864" />
    <meta name="description" content="Dashboard de Maquinarias - Programa Nuestras Ciudades MVCS" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json" />

    <!-- Iconos Apple (iOS) -->
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="./icon-512.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./favicon.png" />

    <title>Dashboard PNC</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Registrar Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(() => console.log('PWA: Service Worker registrado'))
            .catch(err => console.log('PWA: Error SW', err))
        })
      }
    </script>
  </body>
</html>
